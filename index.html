<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠퍼스타운 허브 · CampusTown Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
.tabsep{align-self:center;font-size:11px;font-weight:800;color:var(--soft);letter-spacing:1px;
  padding:0 4px 0 10px;border-left:1px solid var(--line);margin-left:4px;white-space:nowrap;opacity:.75;}
.gate{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1000px 500px at 80% -10%,rgba(18,189,176,.20),transparent 60%),
    radial-gradient(800px 450px at -10% 110%,rgba(14,124,116,.16),transparent 55%),var(--ink);}
.gate-inner{width:min(560px,92vw);background:rgba(255,255,255,.06);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.gate-brand{display:flex;align-items:center;gap:13px;margin-bottom:22px;}
.gate-title{font-size:22px;font-weight:800;color:#fff;}.gate-title b{color:var(--mint2);}
.gate-sub{font-size:13px;color:#8FD9D2;margin-top:2px;}
.gate-search{display:flex;gap:8px;}
.gate-search input{flex:1;font-family:inherit;font-size:15px;padding:13px 15px;border-radius:12px;
  border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.9);outline:none;}
.gate-result{margin-top:16px;}
.gate-hint{margin-top:18px;font-size:12px;color:#8FD9D2;line-height:1.6;text-align:center;}
.gate-card{background:rgba(255,255,255,.95);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
.gate-card h4{font-size:16px;color:var(--ink);margin-bottom:4px;}
.gate-card .m{font-size:12.5px;color:var(--soft);margin-bottom:12px;}
.gate-name{display:flex;gap:8px;}
.gate-name input{flex:1;font-family:inherit;font-size:14px;padding:11px 13px;border-radius:10px;border:1px solid var(--line);outline:none;}
.gate-err{font-size:12.5px;color:#e03131;margin-top:8px;}
.gate-ok{font-size:12.5px;color:var(--deep);margin-top:8px;}
.auth-tabs{display:flex;gap:0;margin-bottom:18px;background:rgba(255,255,255,.08);border-radius:13px;padding:4px;}
.at{flex:1;font-family:inherit;font-size:14px;font-weight:700;padding:10px 0;border-radius:10px;
  border:none;background:transparent;color:#b8e6e1;cursor:pointer;transition:all .18s ease;}
.at.on{background:#fff;color:var(--deep);box-shadow:0 2px 8px rgba(0,0,0,.14);}
.auth-in{width:100%;font-family:inherit;font-size:15px;padding:14px 16px;margin-bottom:11px;border-radius:13px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.95);outline:none;box-sizing:border-box;transition:border .15s ease;}
.auth-in:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(18,189,176,.18);}
.auth-btn{width:100%;margin-top:6px;padding:15px;font-size:15.5px;font-weight:800;border-radius:13px;letter-spacing:-0.01em;
  background:linear-gradient(135deg,#12BDB0,#0E7C74);box-shadow:0 8px 22px rgba(18,189,176,.38);}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(18,189,176,.46);}
.auth-msg{margin-top:10px;font-size:13px;min-height:16px;}
.auth-hint{margin-top:12px;font-size:11.5px;color:#8FD9D2;line-height:1.55;}
.auth-roles{display:flex;flex-direction:column;gap:7px;margin:4px 0 12px;}
.rolepick{display:flex;align-items:center;gap:8px;font-size:14px;color:#eafffb;cursor:pointer;}
.social-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.social{font-family:inherit;font-size:13.5px;font-weight:700;padding:11px;border-radius:11px;border:none;cursor:pointer;color:#fff;transition:transform .12s ease;}
.social:hover{transform:translateY(-1px);}
.social.gmail{background:#EA4335;}
.social.naver{background:#03C75A;}
.social.kakao{background:#FEE500;color:#3A1D1D;}
.social.apple{background:#111;}
.social-or{text-align:center;font-size:12px;color:#8FD9D2;margin:2px 0 12px;}
.auth-roles-top{margin:0 0 14px;}
.social-list{display:flex;flex-direction:column;gap:9px;}
.social2{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  font-family:inherit;font-size:14px;font-weight:700;padding:12px;border-radius:12px;border:none;cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease;}
.social2:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.18);}
.social2 svg{flex:0 0 auto;}
.s-google{background:#fff;color:#3c4043;border:1px solid #dadce0;}
.s-naver{background:#03C75A;color:#fff;}
.s-kakao{background:#FEE500;color:#3A1D1D;}
.s-apple{background:#111;color:#fff;}
.s-email{background:var(--mint);color:#fff;}
.email-form{margin-top:12px;}
.today-sum{font-size:14px;color:var(--soft);line-height:1.6;}
.today-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
.today-tags span{font-size:11.5px;font-weight:700;color:var(--deep);background:var(--mist);padding:4px 11px;border-radius:20px;}
.ocard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:11px;}
.oc-top b{font-size:15.5px;color:var(--ink);}
.oc-body{font-size:13px;color:var(--soft);line-height:1.65;margin-top:9px;background:var(--mist);border-radius:11px;padding:12px 14px;max-height:180px;overflow-y:auto;}
.oc-actions{display:flex;gap:7px;margin-top:12px;justify-content:flex-end;}
.oc-actions button{min-width:118px;padding:9px 14px;font-size:12.5px;}
.backup-row{display:flex;gap:7px;margin-top:12px;justify-content:flex-end;}
.backup-row button{min-width:112px;}
.backup-row button{flex:1;font-size:12.5px;padding:9px;}
.backup-hint{font-size:11.5px;color:#8FD9D2;margin-top:9px;line-height:1.5;text-align:center;}
.invite-notice{font-size:12.5px;color:#cfeeeb;background:rgba(255,255,255,.08);border-radius:11px;padding:11px 13px;margin-bottom:14px;line-height:1.55;}
.privacy-note{font-size:12px;color:var(--deep);background:var(--mist);border-radius:9px;padding:9px 12px;margin-bottom:10px;line-height:1.5;}
.purge-badge{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--deep);padding:3px 9px;border-radius:20px;margin-left:6px;}
.ml-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:#eafffb;font-size:14px;}
.ml-search{display:flex;gap:7px;margin-bottom:14px;}
.ml-search .auth-in{flex:1;}
.ml-search .b-ghost,.ml-search .b-mint{white-space:nowrap;padding:0 14px;}
.ml-list{display:flex;flex-direction:column;gap:10px;max-height:44vh;overflow-y:auto;}
.mcard2{background:rgba(255,255,255,.96);border-radius:16px;padding:15px 17px;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mc-top h4{font-size:16px;color:var(--ink);margin:0;line-height:1.3;}
.mc-badge{flex:0 0 auto;font-size:10.5px;font-weight:700;color:#fff;background:var(--deep);padding:3px 9px;border-radius:20px;}
.mc-meta{font-size:12.5px;color:var(--soft);margin-top:5px;}
.mc-enter{margin-top:11px;width:100%;padding:10px;}
.home-slide{border-radius:14px;overflow:hidden;min-height:230px;display:flex;position:relative;margin-bottom:10px;}
.home-slide .pad{padding:22px 24px;width:100%;}
.home-slide h1{font-size:22px;line-height:1.25;}.home-slide h2{font-size:19px;}
.home-slide .kick{font-size:11px;letter-spacing:2px;font-weight:800;opacity:.8;}
.home-slide .sub{font-size:13px;margin-top:8px;line-height:1.5;}
.home-cap{background:var(--ink);color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;line-height:1.5;}
.home-terms{font-size:12px;color:var(--mint2);font-weight:400;margin-top:5px;}
.home-nav{display:flex;align-items:center;gap:9px;margin-top:10px;}
.home-num{font-size:13px;font-weight:700;color:var(--deep);}
.vrow{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.vframe-empty{min-height:300px;display:flex;align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(135deg,var(--mist),#eafaf8);border-radius:16px;padding:30px;}
.jobcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;}
.job-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.job-top b{font-size:15px;color:var(--ink);}
.job-status{flex:0 0 auto;font-size:11px;font-weight:700;color:#fff;background:var(--mint);padding:3px 10px;border-radius:20px;}
.job-desc{font-size:13px;color:var(--soft);margin-top:5px;line-height:1.45;}
.job-meta{font-size:12px;color:var(--deep);margin-top:6px;font-weight:600;}
.job-actions{display:flex;gap:7px;margin-top:11px;justify-content:flex-end;}
.job-actions button{min-width:118px;padding:9px 14px;font-size:12.5px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.ccard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;}
.c-name{font-size:16px;font-weight:800;color:var(--deep);}
.c-role{font-size:11px;font-weight:700;color:#fff;background:var(--mint);display:inline-block;padding:2px 9px;border-radius:20px;margin-top:5px;}
.c-desc{font-size:12.5px;color:var(--soft);margin-top:7px;line-height:1.45;}
.docdl{display:block;text-decoration:none;transition:.15s;cursor:pointer;}
.docdl:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(12,38,34,.16);}
.docdl h4{color:var(--deep);}
.docdl::after{content:"다운로드";font-size:11px;color:var(--mint);font-weight:700;display:block;margin-top:8px;}
.slide-illo{position:absolute;top:5%;right:6%;width:88px;height:88px;opacity:.9;}
.slide-illo svg{width:100%;height:100%;}
.s-ink .slide-illo,.s-deep .slide-illo{opacity:.95;}
.caption-box{max-width:960px;margin:0 auto;width:100%;background:var(--ink);border-radius:12px;padding:12px 18px;}
.caption-box .cap-line{font-size:16px;font-weight:700;color:#fff;line-height:1.5;}
.caption-box .cap-terms{font-size:12.5px;color:var(--mint2);margin-top:6px;}
:root{
  --mint:#12BDB0;--mint2:#0FD6C6;--deep:#0E7C74;--ink:#0C2622;--ink2:#123430;
  --gray:#41504D;--soft:#6B7C79;--light:#E7F7F5;--mist:#F4FBFA;--gold:#0B5F59;
  --line:#DCEEEB;--glass:rgba(255,255,255,.72);--shadow:0 8px 30px rgba(12,38,34,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','IBM Plex Sans KR','Noto Sans KR',-apple-system,sans-serif;
  font-size:17px;letter-spacing:-0.01em;color:var(--gray);height:100vh;overflow:hidden;
  background:
    radial-gradient(1200px 600px at 85% -10%,rgba(18,189,176,.18),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(14,124,116,.14),transparent 55%),
    var(--mist);}
.app{display:flex;flex-direction:column;height:100vh;}

/* ===== top bar ===== */
header{backdrop-filter:blur(14px);background:rgba(12,38,34,.86);color:#fff;
  padding:14px 22px;display:flex;align-items:center;gap:14px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06);}
.brand{display:flex;align-items:center;gap:10px;}
.brand svg{width:30px;height:30px;filter:drop-shadow(0 2px 6px rgba(18,189,176,.5));}
.brand .name{font-size:24px;font-weight:800;letter-spacing:.2px;}
.brand .name b{color:var(--mint2);}
.brand .sub{font-size:13px;color:#8FD9D2;margin-top:2px;}
.hspace{flex:1;}
.pill{display:flex;align-items:center;gap:7px;font-size:12px;padding:5px 12px;
  border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);}
.pill .led{width:8px;height:8px;border-radius:50%;background:#7d8;transition:.3s;}
.pill.idle .led{background:#F5B301;}
.pill.live .led{background:#ff5b5b;animation:pulse 1.2s infinite;box-shadow:0 0 0 0 rgba(255,91,91,.6);}
.pill.wait .led{background:var(--mint2);animation:spin 1s linear infinite;border-radius:2px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,91,91,.6);}70%{box-shadow:0 0 0 7px rgba(255,91,91,0);}100%{box-shadow:0 0 0 0 rgba(255,91,91,0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.clock{font-size:12px;color:#9FD9D3;font-variant-numeric:tabular-nums;}

/* ===== tab bar ===== */
.tabs{display:flex;gap:4px;padding:8px 14px;flex-shrink:0;overflow-x:auto;
  background:var(--glass);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.tab{padding:11px 18px;font-size:15.5px;font-weight:700;color:var(--soft);cursor:pointer;
  border-radius:11px;white-space:nowrap;display:flex;align-items:center;gap:7px;transition:.15s;}
.tab:hover{background:#fff;color:var(--deep);}
.tab.active{background:linear-gradient(135deg,var(--mint),var(--deep));color:#fff;
  box-shadow:0 4px 14px rgba(18,189,176,.35);}
.tab .badge{font-size:10px;background:rgba(255,255,255,.28);color:#fff;border-radius:9px;padding:1px 7px;}
.tab:not(.active) .badge{background:var(--mint);color:#fff;}

/* ===== body ===== */
.body{flex:1;display:grid;grid-template-columns:1fr 340px;min-height:0;}
.body.solo{grid-template-columns:1fr;}
.stage{overflow-y:auto;min-height:0;padding:22px;}
.rail{border-left:1px solid var(--line);background:var(--glass);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;min-height:0;}
.rail h3{font-size:12px;font-weight:800;color:var(--deep);padding:12px 15px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;}
.rail h3 .tag{margin-left:auto;font-size:10px;color:#fff;background:var(--mint);padding:2px 8px;border-radius:9px;}
.notelist{flex:1;overflow-y:auto;padding:11px 13px;}
.notelist .empty{color:#9fb3b0;font-size:12px;font-style:italic;padding:6px 2px;}
.note{background:#fff;border-left:3px solid var(--mint);border-radius:9px;padding:9px 11px;
  margin-bottom:7px;font-size:13.5px;line-height:1.5;box-shadow:0 2px 6px rgba(12,38,34,.05);}
.note.me{border-left-color:var(--gold);background:#FBF8EF;}
.note .who{font-size:10px;font-weight:700;color:var(--deep);display:block;margin-bottom:2px;}
.noteinput{display:flex;gap:6px;padding:10px 13px;border-top:1px solid var(--line);}
.noteinput input{flex:1;font-family:inherit;font-size:12.5px;padding:9px 11px;
  border:1px solid var(--line);border-radius:9px;outline:none;background:#fff;}
.noteinput input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(18,189,176,.12);}

button{font-family:inherit;font-size:14px;font-weight:700;border:none;border-radius:10px;
  padding:9px 15px;cursor:pointer;transition:.15s;letter-spacing:.2px;}
.b-mint{background:linear-gradient(135deg,var(--mint),var(--deep));color:#fff;box-shadow:0 4px 14px rgba(18,189,176,.3);}
.b-mint.on{background:linear-gradient(135deg,#ff6b6b,#e03131);box-shadow:0 4px 14px rgba(224,49,49,.3);}
.b-ghost{background:#fff;color:var(--deep);border:1px solid var(--line);}
.b-deep{background:var(--ink2);color:#fff;}
.b-gold{background:linear-gradient(135deg,#0f8f85,var(--gold));color:#fff;}
button:hover{filter:brightness(1.05);transform:translateY(-1px);}
button:active{transform:translateY(0);}
button:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ===== cards / glass ===== */
.glass{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);
  border-radius:18px;box-shadow:var(--shadow);}
.section-title{font-size:14px;letter-spacing:1.5px;font-weight:800;color:var(--mint);margin-bottom:8px;}
.hero h2{font-size:27px;}
.mini{font-size:13.5px;}

/* ===== HERO (home / meeting cover) ===== */
.hero{max-width:1000px;margin:0 auto;}
.cover{position:relative;overflow:hidden;border-radius:24px;padding:34px 36px;color:#fff;
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 55%,var(--deep) 120%);
  box-shadow:0 18px 50px rgba(12,38,34,.28);margin-bottom:18px;}
.cover .orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;}
.cover .orb1{width:220px;height:220px;background:radial-gradient(circle,var(--mint),transparent 65%);top:-70px;right:-40px;}
.cover .orb2{width:160px;height:160px;background:radial-gradient(circle,var(--deep),transparent 60%);bottom:-60px;right:120px;}
.cover .status-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;margin-bottom:14px;}
.cover .status-chip .d{width:8px;height:8px;border-radius:50%;background:#F5B301;}
.cover.live .status-chip .d{background:#ff5b5b;animation:pulse 1.2s infinite;}
.cover h1{font-size:33px;font-weight:800;line-height:1.2;margin-bottom:8px;position:relative;}
.cover .meta{font-size:14.5px;display:flex;flex-wrap:wrap;gap:18px;margin-top:14px;font-size:13px;color:#CFEDEA;position:relative;}
.cover .meta b{color:#fff;font-weight:700;}
.cover .aiedit{position:absolute;top:16px;right:18px;font-size:10.5px;color:#8FD9D2;
  display:flex;align-items:center;gap:5px;}
.cover .aiedit .dot{width:6px;height:6px;border-radius:50%;background:var(--mint2);animation:pulse 1.6s infinite;}

.grid{display:grid;gap:14px;}
.g2{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:repeat(3,1fr);}
.tile{padding:16px 18px;border-radius:16px;}
.tile h4{font-size:16.5px;font-weight:800;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.tile .muted{font-size:14.5px;color:var(--soft);line-height:1.6;}
.kv{font-size:12.5px;line-height:1.8;}
.kv b{color:var(--deep);}

.startbtn{width:100%;padding:15px;font-size:15px;border-radius:14px;margin-top:4px;}
.stepline{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--soft);margin:8px 0;}
.stepline .num{width:20px;height:20px;border-radius:50%;background:var(--mint);color:#fff;
  font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* attendees & uploads */
.chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
  border-radius:20px;padding:5px 10px 5px 12px;font-size:12px;margin:3px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.chip .x{cursor:pointer;color:#b9c;font-weight:700;}
.chip .av{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--deep));
  color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.uprow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
  border-radius:11px;padding:9px 12px;margin-bottom:7px;font-size:12.5px;}
.uprow .ic{font-size:18px;}
.uprow .nm{font-weight:700;color:var(--ink);}
.uprow .mt{font-size:11px;color:var(--soft);}
.uprow .x{margin-left:auto;cursor:pointer;color:#c9a;font-weight:700;}
.dropzone{border:2px dashed var(--line);border-radius:14px;padding:20px;text-align:center;
  color:var(--soft);font-size:12.5px;background:rgba(255,255,255,.5);cursor:pointer;transition:.15s;}
.dropzone:hover,.dropzone.over{border-color:var(--mint);background:var(--light);color:var(--deep);}

/* slides */
.slidewrap{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
.slide{width:100%;aspect-ratio:16/9;border-radius:18px;overflow:hidden;position:relative;color:#fff;
  box-shadow:0 12px 40px rgba(12,38,34,.18);}
.s-ink{background:linear-gradient(135deg,var(--ink),var(--ink2));}
.s-mist{background:linear-gradient(135deg,#fff,var(--mist));color:var(--gray);}
.s-deep{background:linear-gradient(135deg,var(--deep),#0a5f58);}
.slide .pad{position:absolute;inset:0;padding:5.5% 6.5%;}
.slide h1{font-size:30px;font-weight:800;line-height:1.16;}
.slide h2{font-size:23px;font-weight:800;color:var(--ink);}

async function sbFetch(path, opts={}){
  const url=SUPABASE_URL.replace(/\/$/,"")+"/rest/v1/"+path;
  const res=await fetch(url,{
    ...opts,
    headers:{
      "apikey":SUPABASE_ANON_KEY,

      "Content-Type":"application/json",
      "Prefer":"resolution=merge-duplicates,return=representation",

    },
  });

  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

// AI 호출: API 키는 localStorage(이 브라우저)에만 저장 — 소스코드·GitHub에는 절대 넣지 않음
function getApiKey(){ return localStorage.getItem("medit:apikey")||""; }
function setApiKey(k){

function refreshApiKeyStatus(){

// AI 호출 경로 (순서대로 시도):
//  ① 공유 프록시 — Supabase Edge Function "claude-proxy". 운영자의 키를 서버에 두고,
//     로그인한 사용자는 각자 키 없이 사용. (배포 안 되어 있으면 자동으로 ②로 넘어감)
//  ② 개인 키 — 이 브라우저에 등록한 본인 키
const AI_PROXY_NAMES=["claude-proxy","quick-service","rapid-service"];   // 순서대로 시도
async function callViaProxy(system,user,maxTokens){
  if(!authReady) throw new Error("no-auth");
  const {data:{session}}=await sb.auth.getSession();
  if(!session) throw new Error("로그인 필요");
  const base=SUPABASE_URL.replace(/\/$/,"")+"/functions/v1/";
  const cached=localStorage.getItem("medit:proxyfn");
  const names=cached?[cached,...AI_PROXY_NAMES.filter(n=>n!==cached)]:AI_PROXY_NAMES;
  let lastErr=null;
  for(const fn of names){
    try{
      const res=await fetch(base+fn,{method:"POST",
        headers:{"Content-Type":"application/json",
          "Authorization":"Bearer "+session.access_token,"apikey":SUPABASE_ANON_KEY},
        body:JSON.stringify({system,user,maxTokens:maxTokens||1000})});
      if(res.status===404){ lastErr=new Error(fn+" 없음"); continue; }   // 다음 이름 시도
      const d=await res.json().catch(()=>({}));
      if(!res.ok){ lastErr=new Error("proxy "+res.status+(d.error?" — "+d.error:"")); continue; }
      if(d.error){ lastErr=new Error(d.error); continue; }
      localStorage.setItem("medit:proxyfn",fn);                          // 작동한 이름 기억
      return d.text||"";
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error("프록시 없음");
}
async function callClaude(system,user,maxTokens){
  // ① 공유 프록시
  try{ return await callViaProxy(system,user,maxTokens); }
  catch(e){ console.warn("공유 프록시 사용 불가 → 개인 키로 시도:",e.message); }
  // ② 개인 키
  let key=getApiKey();
  if(!key){
    key=prompt("AI 요약을 쓰려면 Anthropic API 키가 필요합니다.\nconsole.anthropic.com → API Keys에서 발급 (sk-ant-…)\n키는 이 브라우저에만 저장되고 어디에도 전송·게시되지 않습니다.\n\n비워두고 확인하면 AI 없이 진행합니다.");
    if(key){ setApiKey(key); } else { throw new Error("API 키 없음 — AI 기능 건너뜀"); }
  }
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens||1000,system,messages:[{role:"user",content:user}]})});
  if(res.status===401){ localStorage.removeItem("medit:apikey"); throw new Error("API 키가 유효하지 않습니다 — 다시 입력해 주세요"); }
  if(!res.ok)throw new Error("API "+res.status);
  const d=await res.json();return d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

function linkJobToMeeting(jobId){
  const j=state.jobs.find(x=>x.id===jobId); if(!j)return;
  // 연결할 수 있는 다른 회의 목록
  const others=state.meetings.filter(m=>!(j.linkedMeetingIds||[]).includes(m.id));
  if(!others.length){ toast("연결할 다른 회의가 없습니다. 먼저 회의를 만들어 주세요."); return; }
  const list=others.map((m,i)=>`${i+1}. ${m.title} (${fmtDate(m.date)})`).join("\n");
  const pick=prompt("이 잡을 연결할 회의 번호를 입력하세요:\n\n"+list,"1");
  const idx=parseInt(pick,10)-1;
  if(isNaN(idx)||idx<0||idx>=others.length)return;
  const target=others[idx];
  j.linkedMeetingIds=j.linkedMeetingIds||[]; j.linkedMeetingIds.push(target.id);
  target.jobs=target.jobs||[]; if(!target.jobs.includes(j.id))target.jobs.push(j.id);
  scheduleSave(); renderJobs();
  toast(`'${j.title}'을(를) '${target.title}'에 연결했습니다`);
}

const BUCKET="documents";
function canUpload(){ return state.user.role==="operator"||state.user.role==="host"; }

async function listFiles(){
  if(!sb) return null;
  try{
    const {data,error}=await sb.storage.from(BUCKET).list("",{limit:100,sortBy:{column:"created_at",order:"desc"}});
    if(error) throw error;
    return (data||[]).filter(f=>f.name && f.name!==".emptyFolderPlaceholder");
  }catch(e){ console.warn("자료 목록 실패:",e.message); return null; }

async function uploadFiles(files){
  const st=$("upStatus");
  if(!sb){ if(st)st.textContent="클라우드에 연결되지 않았습니다."; return; }
  for(const f of files){
    if(f.size > 50*1024*1024){ if(st)st.textContent=f.name+" — 50MB를 초과합니다."; continue; }
    if(st)st.textContent=f.name+" 업로드 중…";
    try{
      // Supabase Storage는 한글·공백·특수문자를 허용하지 않습니다.
      const ext=(f.name.match(/\.[^.]+$/)||[""])[0].toLowerCase();
      const safe=Date.now()+"_"+Math.random().toString(36).slice(2,7)+ext;
      const {error}=await sb.storage.from(BUCKET).upload(safe,f,{upsert:false});
      if(error) throw error;
      // 원본 이름 매핑 저장 (목록에서 한글 이름으로 표시)
      state.fileNames=state.fileNames||{};
      state.fileNames[safe]=f.name;
      await saveNow();
      if(st)st.textContent=f.name+" 업로드 완료";
    }catch(e){
      if(st)st.textContent="업로드 실패: "+e.message;
      if(/Bucket not found/i.test(e.message)&&st) st.textContent="Supabase Storage에 '"+BUCKET+"' 버킷을 먼저 만들어 주세요.";
      return;
    }
  }
  renderFiles();
  renderFiles("homeFileList");
  refreshBadges();
}

const FILE_SIZES={};   // 저장 파일명 → 크기(뷰어 10MB 제한 확인용)
async function viewFile(name){
  if(!sb){ toast("클라우드에 연결되지 않았습니다"); return; }
  try{
    const {data,error}=await sb.storage.from(BUCKET).createSignedUrl(name,3600);
    if(error) throw error;
    const url=data.signedUrl, ext=(name.split(".").pop()||"").toLowerCase();
    if(ext==="pptx"||ext==="ppt"){
      openPptViewer(url,name);          // 앱 내 렌더링 — 그림·도형 포함
    } else if(["doc","docx","xls","xlsx"].includes(ext)){
      const sz=(FILE_SIZES&&FILE_SIZES[name])||0;
      if(sz>10*1048576){ toast("10MB가 넘는 문서는 뷰어가 열지 못합니다 — 다운로드하거나 PDF로 변환해 올려 주세요"); return; }
      window.open("https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url),"_blank");
    } else {
      window.open(url,"_blank");   // PDF·이미지·텍스트는 브라우저가 바로 열어줌
    }
  }catch(e){ toast("열기 실패: "+e.message); }
}

let pptLibsReady=false;
function loadOnce(tag,attrs){return new Promise((ok,no)=>{
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>el[k]=v);
  el.onload=ok; el.onerror=()=>no(new Error("로드 실패: "+(attrs.src||attrs.href)));
  document.head.appendChild(el);
});}
async function ensurePptLibs(){
  if(pptLibsReady) return;
  const base="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@master";
  await loadOnce("link",{rel:"stylesheet",href:base+"/css/pptxjs.css"});
  if(!window.jQuery) await loadOnce("script",{src:"https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"});
  await loadOnce("script",{src:base+"/js/jszip.min.js"});
  await loadOnce("script",{src:base+"/js/filereader.js"});
  await loadOnce("script",{src:base+"/js/pptxjs.js"});
  await loadOnce("script",{src:base+"/js/divs2slides.js"});
  pptLibsReady=true;
}

// 업로드한 텍스트 파일을 AI가 읽어 회의록으로 정리
// 노트 원문을 회의에 저장하고, 같은 제목의 기존 기록(미리보기·MD)에도 반영
async function saveNoteToMeeting(m,text){
  text=(text||"").trim();
  if(text && !(m.rawNote||"").includes(text.slice(0,200))){
    const stamp="[기록 "+new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})+"]";
    m.rawNote=(m.rawNote?m.rawNote+"\n\n":"")+stamp+"\n"+text;
  }
  await saveNow();
  let touched=false;
  (state.records||[]).forEach(rr=>{ if(sameTitle(rr.title,m.title)){
    rr.rawNote=m.rawNote;
    if(!rr.notes&&m.summary)rr.notes={summary:m.summary,actions:(m.actions||[]).slice()};
    if((!rr.tags||!rr.tags.length)&&m.tags&&m.tags.length)rr.tags=m.tags.slice(); touched=true; } });
  if(touched) await saveRecords();
  renderRecords(); if($("archive"))renderArchive();
  return true;
}
async function aiSummarizeFile(storedName){
  const m=currentMeeting(); if(!m){ toast("회의를 먼저 만들어 주세요"); return; }
  if(!sb){ toast("클라우드에 연결되지 않았습니다"); return; }
  toast("파일을 읽는 중…");
  try{
    // 파일 내용 가져오기
    const {data,error}=await sb.storage.from(BUCKET).download(storedName);
    if(error) throw error;
    const text=await data.text();
    if(!text.trim()){ toast("파일이 비어 있습니다"); return; }

    // ① 원문 먼저 저장 — AI 호출과 무관하게 노트가 회의·기록에 남도록
    if(!(m.rawNote||"").includes(text.slice(0,200))){
      m.rawNote=(m.rawNote?m.rawNote+"\n\n":"")+text;
    }
    await saveNow();

    // ② AI 요약 시도 — 실패해도 원문은 이미 저장됨
    let aiOK=false;
    try{
      toast("AI가 회의록을 정리하는 중…");
      const sys="회의 노트를 정리하는 담당자. 아래 노트를 읽고 JSON만 출력: "+
        '{"summary":"3~4문장 요약","tags":["핵심 키워드"],"actions":["다음 액션"]}';
      let o=await callClaude(sys, text.slice(0,12000), 1500);
      o=o.replace(/```json|```/g,"").trim();
      const r=JSON.parse(o);
      m.summary=r.summary||""; m.tags=r.tags||[]; m.actions=r.actions||[];
      await saveNow(); aiOK=true;
    }catch(e){ console.warn("AI 요약 실패(원문은 저장됨):",e.message); }
    // ③ 회의·기록 동기화 (미리보기·MD에 표시)
    await saveNoteToMeeting(m,"");   // rawNote는 위에서 저장됨 — 기록 동기화만 수행

             :"노트 원문을 저장했습니다 (AI 요약은 실패) — 미리보기에서 확인하세요");
  }catch(e){
    toast("노트 저장 실패: "+e.message);

}

async function renderFiles(boxId){
  const box=$(boxId||"fileList"); if(!box) return;
  box.innerHTML='<div class="mini">불러오는 중…</div>';
  const files=await listFiles();
  if(files===null){
    box.innerHTML='<div class="mini">자료를 불러오지 못했습니다. Supabase Storage에 <b>'+BUCKET+'</b> 버킷을 만들어 주세요.</div>';
    return;
  }
  if(!files.length){
    box.innerHTML='<div class="mini">아직 등록된 자료가 없습니다.'+(canUpload()?" 아래에서 업로드하세요.":"")+'</div>';
    return;
  }
  files.forEach(f=>{ FILE_SIZES[f.name]=(f.metadata&&f.metadata.size)||0; });
  box.innerHTML=files.map(f=>`<div class="filerow">
    <div class="f-info"><div class="f-name">${esc(prettyName(f.name))}</div><div class="f-meta">${prettySize(f.metadata&&f.metadata.size)}</div></div>
    <div class="f-acts">
      ${(isTextFile(prettyName(f.name))&&canEditMeeting())?`<button class="b-deep" data-ai="${esc(f.name)}">AI 정리</button>`:""}
      <button class="b-ghost" data-view="${esc(f.name)}">바로보기</button>
      <button class="b-mint" data-dl="${esc(f.name)}">다운로드</button>
      ${canUpload()?`<button class="b-ghost" data-del="${esc(f.name)}">삭제</button>`:""}
    </div></div>`).join("");
  box.querySelectorAll("[data-ai]").forEach(b=>b.onclick=()=>aiSummarizeFile(b.dataset.ai));
  box.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>viewFile(b.dataset.view));
  box.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>downloadFile(b.dataset.dl));
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteFile(b.dataset.del));
}
function bindFiles(){
  renderFiles();
  const z=$("upZone"), inp=$("docInput");
  if(!z||!inp) return;
  z.onclick=()=>inp.click();
  inp.onchange=()=>{ if(inp.files.length) uploadFiles([...inp.files]); inp.value=""; };
  z.ondragover=e=>{e.preventDefault();z.classList.add("drag");};
  z.ondragleave=()=>z.classList.remove("drag");
  z.ondrop=e=>{e.preventDefault();z.classList.remove("drag"); if(e.dataTransfer.files.length) uploadFiles([...e.dataTransfer.files]);};
}

`아래 회의에 초대드립니다.\n\n`+
`■ 회의: ${m.title||""}\n`+

`2. 본인 이메일과 비밀번호로 가입하세요\n`+

function openMail(to,subj,body){
  window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}
function inviteOne(i){
  const a=state.attendees[i]; if(!a||!a.email){ toast("이메일이 없습니다"); return; }
  const m=currentMeeting()||{};
  openMail(a.email, `[초대] ${m.title||"회의"}`, buildInvite(a.name));
  toast(a.name+"님께 보낼 초대 메일을 엽니다");

function inviteAllAttendees(){
  const list=state.attendees.filter(a=>a.email);
  if(!list.length){ toast("이메일이 등록된 참석자가 없습니다"); return; }
  const m=currentMeeting()||{};
  const to=list.map(a=>a.email).join(",");

  openMail(to, `[초대] ${m.title||"회의"}`, buildInvite(names));

async function rmAt(i){

function handleFiles(files){
  [...files].forEach(f=>{
    const readable=/\.(txt|md|csv|json|js|py|html|srt|vtt)$/i.test(f.name)||f.type.startsWith("text");
    const rec={name:f.name,type:f.type||"file",size:f.size,text:null};
    if(readable&&f.size<400000){const fr=new FileReader();fr.onload=()=>{rec.text=fr.result;scheduleSave();};fr.readAsText(f);}
    state.uploads.push(rec);
  });
  renderUpList();scheduleSave();refreshBadges();
}

function renderUpList(){const box=$("upList");if(!box)return;

function bindDeck(){
  $("prevS").onclick=()=>{stopPlay();state.deckIdx=(state.deckIdx-1+SLIDES.length)%SLIDES.length;renderStage("deck");};
  $("nextS").onclick=()=>{stopPlay();state.deckIdx=(state.deckIdx+1)%SLIDES.length;renderStage("deck");};
  $("playS").onclick=()=>playing?stopPlay():startPlay();
  $("editScriptS").onclick=openScriptEditor;
}
function pickKoVoice(){
  const vs=window.speechSynthesis.getVoices()||[];
  const ko=vs.filter(v=>/ko-KR|ko_KR|ko\b/i.test(v.lang));
  // 1순위: 자연스러운 남성/뉴럴 계열
  return ko.find(v=>/(male|남|minsu|injoon|neural|wavenet|google)/i.test(v.name))
      || ko.find(v=>/(natural|siri|premium|enhanced)/i.test(v.name))
      || ko[0] || null;
}
function speakKo(text,onend){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ko-KR";
  u.rate=0.9;   // 조금 느리게 — 차분하고 어른스럽게
  u.pitch=0.88; // 낮은 톤 — 무게감 있는 목소리
  const v=pickKoVoice(); if(v)u.voice=v;
  if(onend)u.onend=onend;
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  return u;
}
function speakSlide(idx){
  if(!("speechSynthesis" in window)){
    autoAdv=setTimeout(()=>{ if(playing){ const next=(idx+1)%SLIDES.length;
      if(next===0){stopPlay();return;} state.deckIdx=next; if(state.activeTab==="deck"||state.activeTab==="home")renderStage(state.activeTab); advance(); } },8000);
    return;
  }
  const sl=SLIDES[idx];
  speakKo(sl.script||sl.caption||"", ()=>{ if(!playing)return;
    const next=(idx+1)%SLIDES.length;
    if(next===0){ stopPlay(); return; }
    state.deckIdx=next; if(state.activeTab==="deck"||state.activeTab==="home")renderStage(state.activeTab); advance();
  });
}
function advance(){ speakSlide(state.deckIdx); }
function startPlay(){ playing=true; if(state.activeTab==="deck"||state.activeTab==="home")renderStage(state.activeTab); toast("자동 발표 시작"); advance(); }
function stopPlay(){ playing=false; if(autoAdv){clearTimeout(autoAdv);autoAdv=null;}
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
  const b=$("playS"); if(b)b.textContent="자동 발표"; }
function openScriptEditor(){
  const box=$("scriptEditor"); if(!box)return;
  if(box.innerHTML){ box.innerHTML=""; return; }
  const sl=SLIDES[state.deckIdx];

  $("scriptSave").onclick=()=>{ SLIDES[state.deckIdx].script=$("scriptTA").value; toast("스크립트 저장됨"); box.innerHTML=""; };
  $("scriptTest").onclick=()=>{ if("speechSynthesis" in window){ const u=new SpeechSynthesisUtterance($("scriptTA").value); u.lang="ko-KR"; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);} };
}

async function saveSummary(){
  const m=currentMeeting(); if(!m) return;
  m.summary=($("sumText").value||"").trim();
  m.tags=($("sumTags").value||"").split(",").map(t=>t.trim()).filter(Boolean);
  m.actions=($("sumActions").value||"").split("\n").map(a=>a.replace(/^\d+[.)]\s*/,"").trim()).filter(Boolean);
  await saveNow();
  closeSummaryEditor(); renderSummary();
  toast("회의 요약이 저장되었습니다");
}
// AI 반영 — 녹취를 읽어 요약 생성 (아티팩트/서버 환경에서만 작동)
async function aiSummary(){
  const m=currentMeeting(); if(!m) return;
  const msg=$("sumMsg");
  if(!state.segments.length){ msg.textContent="녹취 내용이 없습니다. 먼저 회의를 녹취하세요."; return; }
  msg.textContent="AI가 요약하는 중…";
  try{
    const tr=state.segments.map(s=>`[${s.who}] ${s.text}`).join("\n");
    const sys="회의 녹취를 정리하는 담당자. JSON만 출력: {\"summary\":\"3~4문장 요약\",\"tags\":[\"키워드\"],\"actions\":[\"다음 액션\"]}";
    let o=await callClaude(sys,tr,1200);
    o=o.replace(/```json|```/g,"").trim();
    const r=JSON.parse(o);
    m.summary=r.summary||""; m.tags=r.tags||[]; m.actions=r.actions||[];
    await saveNow(); renderSummary();
    msg.textContent="AI 요약이 반영되었습니다. ‘직접 쓰기’로 수정할 수 있습니다.";
  }catch(e){
    msg.textContent="AI 반영 실패: "+e.message+" (직접 쓰기로 작성해 주세요)";
  }
}

function bindTodayNote(){
  const m=currentMeeting(); if(!m) return;
  const ta=$("tdNote"); if(ta) ta.value=m.rawNote||"";

  const mic=$("tdMic");
  if(mic) mic.onclick=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ $("tdMsg").textContent="이 브라우저는 음성인식을 지원하지 않습니다 (Chrome/Edge 권장). 직접 타이핑해 주세요."; return; }
    if(tdOn){
      try{ tdRec && tdRec.stop(); }catch(e){}
      tdOn=false; mic.textContent="녹취 시작"; mic.className="b-mint";
      $("tdMsg").textContent="녹취를 멈췄습니다. 저장을 눌러 보관하세요.";
      return;
    }
    tdRec=new SR(); tdRec.lang="ko-KR"; tdRec.continuous=true; tdRec.interimResults=false;
    tdRec.onresult=e=>{
      let t="";
      for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) t+=e.results[i][0].transcript+" "; }
      if(t){ const ta=$("tdNote"); ta.value=(ta.value+(ta.value?"\n":"")+t.trim()); ta.scrollTop=ta.scrollHeight; }
    };
    tdRec.onerror=e=>{ $("tdMsg").textContent="녹취 오류: "+e.error; tdOn=false; mic.textContent="녹취 시작"; mic.className="b-mint"; };
    tdRec.onend=()=>{ if(tdOn){ try{ tdRec.start(); }catch(e){} } };
    try{ tdRec.start(); tdOn=true; mic.textContent="녹취 중지"; mic.className="b-gold";
      $("tdMsg").textContent="듣고 있습니다… 말씀하세요."; }
    catch(e){ $("tdMsg").textContent="마이크를 시작할 수 없습니다: "+e.message; }
  };

  const sv=$("tdSaveNote");
  if(sv) sv.onclick=async()=>{
    const m=currentMeeting(); if(!m) return;
    m.rawNote=($("tdNote").value||"").trim();
    await saveNow();
    $("tdMsg").textContent="저장되었습니다. 회의록으로 보관됩니다.";
    toast("회의 내용이 저장되었습니다");
  };
}

  $("syncBtn").onclick=syncNotes;$("endBtn2").onclick=endMeeting;
  $("ttsBtn").onclick=toggleTTS;
  $("researchBtn").onclick=doResearch;$("researchInput").addEventListener("keydown",e=>{if(e.key==='Enter')doResearch();});

    const open=w.style.display==="none"; w.style.display=open?"":"none"; a.textContent=open?"▾":"▸";};

  noteInfo();

    if(!mn.value.trim()){toast("내용을 입력해 주세요");return;}
    await saveNoteToMeeting(m,mn.value);
    mn.value=""; noteInfo();
    toast("노트를 저장했습니다 — 회의 기록 미리보기에 포함됩니다");
  };
  let tidyBackup=null;
  if($("aiTidyNote"))$("aiTidyNote").onclick=async()=>{
    const src=mn.value.trim();
    if(!src){toast("정리할 내용을 먼저 입력하거나 [업로드 자료 첨부]로 불러오세요");return;}
    toast("AI가 자료를 정리하는 중…");
    try{
      const sys="회의 노트 정리 담당자. 아래 원문을 사실 위주로 담백하게 정리한다. "+
        "짧은 문장. 과장·수식어·철학적 표현 금지. 원문에 없는 내용을 추가하지 않는다. "+

        "다른 말 없이 정리 결과만 출력.";
      const out=await callClaude(sys, src.slice(0,15000), 1800);
      if(!out.trim()) throw new Error("빈 응답");
      tidyBackup=src;
      mn.value=out.trim();

      mn.scrollTop=0;

  };

    if(tidyBackup!==null){ mn.value=tidyBackup; tidyBackup=null; $("undoTidy").style.display="none"; toast("정리 전 원문으로 되돌렸습니다"); }

function renderTranscript(interim){const box=$("transcript");if(!box)return;
  if(!state.segments.length&&!interim){box.innerHTML='<div class="mini" style="font-style:italic">회의를 시작하면 자동으로 녹취됩니다. 타이핑도 가능합니다.</div>';return;}
  let h=state.segments.map(s=>`<div class="note ${s.who==='나'?'me':''}"><span class="who">${esc(s.who)} · ${s.time}</span>${esc(s.text)}</div>`).join("");
  if(interim)h+=`<div class="note" style="opacity:.5;font-style:italic"><span class="who">발화 (인식중…)</span>${esc(interim)}</div>`;
  box.innerHTML=h;box.scrollTop=box.scrollHeight;const sc=$("segCount");if(sc)sc.textContent=state.segments.length;}
function addSegment(text,who){if(!text.trim())return;
  state.segments.push({text:text.trim(),who:who||'교수님',time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  renderTranscript();refreshBadges();scheduleSave();}
function addTyped(){const v=$("typeInput").value;if(v.trim()){addSegment(v,'나');$("typeInput").value="";}}

let recog=null,listening=false,autoTimer=null;
function initRecog(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){const h=$("micHint");if(h)h.textContent="음성인식 미지원 — 타이핑 사용";const b=$("micBtn");if(b)b.disabled=true;return;}
  recog=new SR();recog.lang='ko-KR';recog.continuous=true;recog.interimResults=true;
  recog.onresult=e=>{let it="";for(let i=e.resultIndex;i<e.results.length;i++){const r=e.results[i];
    if(r.isFinal)addSegment(r[0].transcript,'교수님');else it+=r[0].transcript;}renderTranscript(it);};
  recog.onerror=e=>{if(e.error==='not-allowed'){toast("마이크 권한이 필요합니다");stopMic();}};
  recog.onend=()=>{if(listening){try{recog.start();}catch(_){}}};
}
function startMic(){if(!recog)initRecog();if(!recog)return;try{recog.start();}catch(_){}
  listening=true;const b=$("micBtn");if(b){b.classList.add("on");b.textContent="⏹ 녹취 중지";}
  setPill("live","녹취 중");}

// TTS — 회의 읽어주기 (마이크 불필요, 스피커만)
let ttsOn=false;
function toggleTTS(){
  if(!("speechSynthesis" in window)){ toast("이 브라우저는 음성 읽기를 지원하지 않습니다"); return; }
  if(ttsOn){ window.speechSynthesis.cancel(); ttsOn=false; const b=$("ttsBtn"); if(b)b.textContent="회의 읽어주기"; return; }
  // build reading text: notes summary + agenda/decisions, else transcript
  let text="";
  if(state.notes){ const n=state.notes;
    text="회의 요약. "+(n.summary||"")+". ";
    if(n.agenda&&n.agenda.length) text+="안건. "+n.agenda.join(", ")+". ";
    if(n.decisions&&n.decisions.length) text+="결정 사항. "+n.decisions.join(", ")+". ";
    if(n.actions&&n.actions.length) text+="액션 아이템. "+n.actions.join(", ")+". ";
  } else if(state.segments.length){
    text="회의 녹취. "+state.segments.slice(-15).map(s=>s.text).join(". ");
  } else { toast("읽을 회의 내용이 없습니다"); return; }
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ko-KR"; u.rate=1.0; u.pitch=1.0;
  u.onend=()=>{ ttsOn=false; const b=$("ttsBtn"); if(b)b.textContent="회의 읽어주기"; };
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  ttsOn=true; const b=$("ttsBtn"); if(b)b.textContent="⏹ 읽기 중지";
}

async function syncNotes(silent){
  // 입력원: ① 녹취 ② 저장된 수기 노트(m.rawNote) ③ 입력란의 미저장 내용
  const m=currentMeeting();
  const mnEl=$("manualNote");
  const manual=[(m&&m.rawNote)||"",(mnEl&&mnEl.value.trim())||""].filter(Boolean).join("\n\n");
  if(!state.segments.length && !manual){
    if(!silent)toast("반영할 내용이 없습니다 — 녹취하거나 수기 회의록을 입력·첨부하세요");return;}
  const b=$("syncBtn");if(b){b.disabled=true;b.textContent="반영 중…";}
  setPill("wait","AI 정리 중");
  const upText=state.uploads.filter(u=>u.text).map(u=>`[자료:${u.name}] ${u.text.slice(0,1500)}`).join("\n");
  const tr=state.segments.map(s=>`[${s.who}] ${s.text}`).join("\n");
  const sys="당신은 한국어 회의 서기입니다. 순수 JSON만 출력(설명·코드펜스 없이). "+
    '스키마:{"title":"회의 제목(간결)","purpose":"목적 한 줄","summary":"1-2문장 개요","tags":["주제태그"],"agenda":[],"decisions":[],"actions":[],"followups":[],"nextActions":["AI가 추천하는 다음 할 일"]}. '+
    "약학대학 교수와 MedIT(디지털 약료 플랫폼) 대표의 회의입니다. 참석자·자료 맥락을 반영하세요.";
  try{
    const body=(upText?("사전자료:\n"+upText+"\n\n"):"")
      +(manual?("회의 노트(수기):\n"+manual.slice(0,12000)+"\n\n"):"")
      +(tr?("녹취:\n"+tr):"");
    let o=await callClaude(sys,body,1400);
    o=o.replace(/```json|```/g,"").trim();const j=JSON.parse(o);
    state.notes={summary:j.summary,agenda:j.agenda||[],decisions:j.decisions||[],actions:j.actions||[],followups:j.followups||[]};
    state.topicTags=j.tags||[];state.nextActions=j.nextActions||[];
    // AI auto-edit meeting title/purpose
    if(j.title)state.meeting.title=j.title;
    if(j.purpose)state.meeting.purpose=j.purpose;
    renderNotes();scheduleSave();
    // 회의 객체·기존 기록에도 반영 → 미리보기·MD 즉시 갱신
    if(m){ m.summary=j.summary||m.summary; m.tags=j.tags||m.tags; m.actions=j.actions||m.actions;
           await saveNoteToMeeting(m,(mnEl&&mnEl.value.trim())||""); if(mnEl)mnEl.value=""; }
    if(!silent)toast("회의록·제목·다음할일 자동 갱신됨 — 회의 기록 미리보기에 반영됨");
  }catch(e){if(!silent)toast("반영 실패: "+e.message);}
  finally{if(b){b.disabled=false;b.textContent="AI 반영";}
    setPill(state.meeting.started&&!state.meeting.ended?"live":"idle",state.meeting.started&&!state.meeting.ended?"회의 진행 중":"회의 대기");}
}

function computeStats(){
  const prof=state.segments.filter(s=>s.who!=='나').length,me=state.segments.filter(s=>s.who==='나').length;
  const words=state.segments.map(s=>s.text).join(" ").split(/\s+/).filter(Boolean).length;
  let dur=0;
  if(state.meeting.started && state.meeting.ended){
    dur=Math.round((state.meeting.ended-state.meeting.started)/60000);
    if(dur<0 || dur>1440) dur=0;    // 비정상 값(음수·24시간 초과) 방지
  }
  return{segs:state.segments.length,prof,me,words,dur};
}
async function endMeeting(){
  if(listening)stopMic();
  state.meeting.ended=Date.now();
  setPill("wait","종료 정리 중");
  const b2=$("endBtn2");if(b2){b2.disabled=true;b2.textContent="정리 중…";}
  if(state.segments.length&&!state.notes){try{await syncNotes(true);}catch(_){}}
  else if(state.segments.length){try{await syncNotes(true);}catch(_){}}
  const stats=computeStats();
  let mood="(분위기 요약 없음)";
  if(state.segments.length){try{
    const tr=state.segments.map(s=>`[${s.who}] ${s.text}`).join("\n");
    mood=await callClaude("회의 분위기 분석가. 녹취를 읽고 3-4문장 한국어로 분위기·톤·합의 정도를 요약. 순수 텍스트.",tr,400);
  }catch(e){mood="분위기 요약 실패: "+e.message;}}
  // email draft
  let email="";try{ email=await buildEmailDraft(mood,stats); }catch(e){ email="(이메일 생성 실패: "+e.message+")"; }
  // 정리된 스크립트 생성 (녹취 원문은 저장하지 않음)
  let script="";
  if(state.segments.length){
    try{
      const tr=state.segments.map(s=>`[${s.who}] ${s.text}`).join("\n");
      script=await callClaude("회의 녹취 정리 담당. 녹취를 읽기 쉬운 스크립트로 정리하라. 중복·잡음·군말 제거, 발언 순서 유지, 한국어. 순수 텍스트만 출력.",tr,2000);
    }catch(e){
      // AI 정리 실패 시: 원문을 그대로 두지 않고 최소 정리본만 생성
      script=state.segments.map(s=>`[${s.who}] ${s.text}`).join("\n");
    }
  }
  const purgedAt=new Date().toLocaleString('ko-KR');
  const segCount=state.segments.length;
  const cm=currentMeeting()||{};
  const rec={id:"m"+Date.now(),dt:new Date().toLocaleString('ko-KR'),
    title:state.meeting.title,purpose:state.meeting.purpose,mood,stats,
    rawNote:cm.rawNote||"",           // 회의 노트 원문 (AI 정리·직접 입력)
    notes:state.notes||(cm.summary?{summary:cm.summary,actions:(cm.actions||[]).slice()}:null),
    tags:(state.topicTags.length?state.topicTags:(cm.tags||[])).slice(),
    nextActions:state.nextActions.slice(),
    attendees:state.attendees.slice(),
    script,                       // 정리된 스크립트 (보존)
    segments:[],                  // 녹취 원문 — 저장하지 않음 (파기)
    purged:{at:purgedAt,count:segCount},   // 파기 기록
    research:state.research.slice(),tabNotes:JSON.parse(JSON.stringify(state.tabNotes)),email};
  state.records.unshift(rec);await saveRecords();
  // 녹취 원문 파기 (메모리에서도 즉시 제거)
  state.segments=[];state.notes=null;state.research=[];state.nextActions=[];state.topicTags=[];
  state.tabNotes={deck:[],app:[],registry:[],console:[]};
  state.meeting.started=null;state.meeting.ended=null;state.meetingStart=null;
  await saveSession();
  setPill("idle","회의 대기");
  if(b2){b2.disabled=false;b2.textContent="종료·정리";}
  toast("회의 종료 · 회의록·스크립트 저장, 녹취 원문은 파기되었습니다");
  switchTab("email");
}

// 기록 보정: 회의 객체의 AI 정리 내용(rawNote·summary·tags)을 기록에 채우고, 비정상 소요시간을 정리
function sameTitle(a,b){
  const n=s=>String(s||"").replace(/\s+/g,"").toLowerCase();
  const x=n(a),y=n(b); if(!x||!y) return false;
  return x===y || x.startsWith(y) || y.startsWith(x);
}
function repairRecords(){
  let changed=false;
  (state.records||[]).forEach(r=>{
    if(r.stats && (r.stats.dur<0 || r.stats.dur>1440)){ r.stats.dur=0; changed=true; }
    const mm=(state.meetings||[]).find(m=>sameTitle(m.title,r.title));
    if(mm){
      if(!r.rawNote && mm.rawNote){ r.rawNote=mm.rawNote; changed=true; }
      if(!r.notes && mm.summary){ r.notes={summary:mm.summary, actions:(mm.actions||[]).slice()}; changed=true; }
      if((!r.tags||!r.tags.length) && mm.tags && mm.tags.length){ r.tags=mm.tags.slice(); changed=true; }
    }
  });
  if(changed) saveRecords();
}
function durLabel(r){ const d=r&&r.stats&&r.stats.dur; return (d>0&&d<=1440)?d+"분":"—"; }
// 카드 밑 상시 표시용 짧은 미리보기 (노트·요약 앞부분)
function recordSnippet(r){
  let src="";
  if(r.rawNote) src=r.rawNote;
  else if(r.notes&&r.notes.summary) src=r.notes.summary;
  else { const mm=(state.meetings||[]).find(m=>sameTitle(m.title,r.title));
         if(mm) src=mm.rawNote||mm.summary||""; }
  if(!src && r.script) src=r.script;
  src=String(src).replace(/\s+/g," ").trim();
  return src?src.slice(0,220)+(src.length>220?"…":""):"";
}
function moodLine(r){
  if(r.mood && r.mood!=="(분위기 요약 없음)") return r.mood;
  if(r.notes&&r.notes.summary) return r.notes.summary;
  if(r.rawNote) return r.rawNote.replace(/\s+/g," ").slice(0,90)+(r.rawNote.length>90?"…":"");
  return r.mood||"";
}
function recordToMD(r){
  // 기록에 노트가 없으면 같은 제목의 회의에서 즉시 가져옴 (저장 여부와 무관하게 표시 보장)
  if(!r.rawNote||!r.notes){
    const mm=(state.meetings||[]).find(m=>sameTitle(m.title,r.title));
    if(mm){ if(!r.rawNote&&mm.rawNote)r.rawNote=mm.rawNote;
      if(!r.notes&&mm.summary)r.notes={summary:mm.summary,actions:(mm.actions||[]).slice()};
      if((!r.tags||!r.tags.length)&&mm.tags)r.tags=(mm.tags||[]).slice(); }
  }
  let md=`# MedIT 회의록 — ${r.dt}\n\n**${r.title}**\n\n`;
  md+=`- 목적: ${r.purpose}\n- 소요: ${durLabel(r)} · 참석: ${r.attendees.map(a=>a.name+(a.email?`(${a.email})`:"")).join(", ")||"—"}\n${(r.tags&&r.tags.length)?`- 태그: ${r.tags.map(t=>"#"+t).join(" ")}\n`:""}\n`;
  if(r.mood&&r.mood!=="(분위기 요약 없음)") md+=`## 회의 분위기\n${r.mood}\n\n`;
  if(r.notes){const n=r.notes,sec=(t,a)=>a&&a.length?`## ${t}\n`+a.map(x=>"- "+x).join("\n")+"\n\n":"";
    if(n.summary)md+=`## 개요\n${n.summary}\n\n`;
    md+=sec("안건",n.agenda)+sec("결정 사항",n.decisions)+sec("액션 아이템",n.actions)+sec("후속",n.followups)+sec("AI 추천 다음 할 일",r.nextActions);}
  // 회의 내용 — 시간순 구획 ([기록 M.D. HH:MM] 도장 기준으로 나눔)
  if(r.rawNote){
    md+=`## 회의 내용 (시간순)\n\n`;
    const parts=r.rawNote.split(/\n?(?=\[기록 [^\]]+\])/).map(s=>s.trim()).filter(Boolean);
    if(parts.length>1 || /^\[기록 /.test(r.rawNote.trim())){
      parts.forEach(p=>{
        const mm2=p.match(/^\[기록 ([^\]]+)\]\n?([\s\S]*)$/);
        if(mm2) md+=`### ${mm2[1]}\n${mm2[2].trim()}\n\n`;
        else md+=p+"\n\n";
      });
    } else { md+=r.rawNote+"\n\n"; }
  }
  const tn=r.tabNotes||{},nm={deck:"슬라이드",app:"복약앱",registry:"약사사이트",console:"콘솔"};
  Object.keys(tn).forEach(k=>{if(tn[k]&&tn[k].length)md+=`## [${nm[k]}] 메모\n`+tn[k].map(x=>`- ${x.text}`).join("\n")+"\n\n";});
  if(r.script) md+=`## 정리된 스크립트\n${r.script}\n\n`;
  if(r.purged&&r.purged.count>0) md+=`> 녹취 원문 ${r.purged.count}건은 ${r.purged.at}에 파기되었습니다.\n\n`;
  return md;}   // 이메일 초안은 회의록에서 제외 — [이메일] 버튼(이메일 센터)에서 별도 작성·전송
function exportRecord(id){const r=state.records.find(x=>x.id===id);if(!r)return;
  const blob=new Blob([recordToMD(r)],{type:"text/markdown"});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="MedIT_회의록_"+r.dt.replace(/[^0-9]/g,"").slice(0,12)+".md";a.click();toast("회의록을 내려받았습니다");}

async function searchMeetings(query){
  const q=(query||"").trim(); if(!q) return [];
  const visible=state.meetings.filter(canView);
  // 1) 이름·키워드 매칭
  const qn=q.replace(/\s|교수님|님/g,"").toLowerCase();
  let hits=visible.filter(m=>{
    const hay=(m.title+" "+m.purpose+" "+m.host+" "+m.company+" "+(m.attendees||[]).map(a=>a.name).join(" ")+" "+m.date+" "+m.time).toLowerCase();
    const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
    const nameHit=(m.attendees||[]).some(a=>{const an=a.name.replace(/\s|교수님|님/g,"").toLowerCase();return an.includes(qn)||qn.includes(an);});
    const timeHit=/오늘|today/i.test(q)&&m.date==="2026-07-10";
    return nameHit||timeHit||toks.some(t=>hay.includes(t));
  });
  // 2) 결과 없으면 AI 매칭 (있을 때만)
  if(!hits.length){
    try{
      const sys="너는 회의 검색기다. 사용자 질의에 맞는 회의 id 배열만 JSON으로 출력: {\"ids\":[...]}. 회의목록: "+JSON.stringify(visible.map(m=>({id:m.id,title:m.title,host:m.host,date:m.date,time:m.time,attendees:(m.attendees||[]).map(a=>a.name)})));
      let o=await callClaude(sys,"질의: "+q,200); o=o.replace(/```json|```/g,"").trim();
      const ids=JSON.parse(o).ids||[]; hits=visible.filter(m=>ids.includes(m.id));
    }catch(e){}
  }
  return hits;
}

function exportData(){
  const dump={
    version:1, exportedAt:new Date().toISOString(),
    accounts:state.accounts, meetings:state.meetings, companies:state.companies,
    jobs:state.jobs, records:state.records, currentMeetingId:state.currentMeetingId,
  };
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="campustown-hub-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(url);
  toast("백업 파일을 내려받았습니다");
}
function importData(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0]; if(!f)return;
    try{
      const text=await f.text();
      const d=JSON.parse(text);
      if(!d||typeof d!=="object")throw new Error("형식이 올바르지 않습니다");
      if(!confirm("현재 데이터를 가져온 파일로 덮어씁니다. 계속할까요?"))return;
      state.accounts=Array.isArray(d.accounts)?d.accounts:[];
      state.meetings=Array.isArray(d.meetings)?d.meetings:[];
      state.companies=Array.isArray(d.companies)?d.companies:[];
      state.jobs=Array.isArray(d.jobs)?d.jobs:[];
      state.records=Array.isArray(d.records)?d.records:[];
      state.currentMeetingId=d.currentMeetingId||null;
      seedData(); await saveSession(); await saveRecords();
      toast("데이터를 가져왔습니다");
      if(state.user&&state.user.role)showMeetingList(); else renderAuth();
    }catch(e){ toast("가져오기 실패: "+e.message); }
  };
  inp.click();
}
function resetData(){
  if(!confirm("모든 데이터를 지우고 초기 상태로 되돌립니다. 계속할까요?"))return;
  state.accounts=[];state.meetings=[];state.companies=[];state.jobs=[];state.records=[];
  state.currentMeetingId=null;state.segments=[];state.notes=null;
  seedData(); saveSession(); saveRecords();
  toast("초기 상태로 되돌렸습니다");
  renderAuth();
}

// ==================== 페이지(탭) API ====================
// HTML 파일을 탭으로 등록합니다. Claude로 만든 웹앱을 올리고 탭으로 붙이는 용도.
//   MedITHub.addPage({id,label,url})   → 탭 추가
//   MedITHub.removePage(id)            → 탭 제거
//   MedITHub.listPages()               → 등록된 탭 목록
function addPage(p){
  if(!p||!p.label||!p.url) throw new Error("label과 url이 필요합니다");
  const id=p.id||("pg_"+Date.now());
  state.pages=state.pages||[];
  if(state.pages.some(x=>x.id===id)) throw new Error("이미 있는 id입니다: "+id);
  state.pages.push({id,label:p.label,url:p.url});
  scheduleSave(); renderTabs();
  return id;
}
function removePage(id){
  state.pages=(state.pages||[]).filter(p=>p.id!==id);
  scheduleSave();
  if(state.activeTab===id) switchTab("home"); else renderTabs();
  return true;
}
function listPages(){ return (state.pages||[]).slice(); }

// 탭 바를 다시 그림 (기본 탭 + 커스텀 페이지 탭)
function renderTabs(){
  const bar=$("tabs"); if(!bar) return;
  // 기존 커스텀 탭 제거
  bar.querySelectorAll("[data-page]").forEach(el=>el.remove());
  const canEdit=state.user.role==="operator"||state.user.role==="host";
  (state.pages||[]).forEach(p=>{
    const el=document.createElement("div");
    el.className="tab"+(state.activeTab===p.id?" active":"");
    el.dataset.tab=p.id; el.dataset.page=p.id;
    el.innerHTML=esc(p.label)+(canEdit?' <span class="tab-x" title="탭 삭제">×</span>':'');
    el.onclick=(e)=>{
      if(e.target.classList.contains("tab-x")){
        e.stopPropagation();
        if(confirm("'"+p.label+"' 탭을 삭제할까요?")) removePage(p.id);
        return;
      }
      switchTab(p.id);
    };
    bar.appendChild(el);
  });
  // 페이지 추가 버튼
  if(canEdit && !bar.querySelector("#tabAdd")){
    const add=document.createElement("div");
    add.className="tab tab-add"; add.id="tabAdd"; add.textContent="+ 페이지";
    add.onclick=addPageFlow;
    bar.appendChild(add);
  }
}
function addPageFlow(){
  const label=prompt("탭 이름 (예: 약국 재고 관리)"); if(!label) return;
  const url=prompt("HTML 파일명 또는 주소\n예: registry.html 또는 https://...","");
  if(!url) return;
  try{ addPage({label:label.trim(),url:url.trim()}); toast("'"+label+"' 탭이 추가되었습니다"); }
  catch(e){ toast(e.message); }
}
function pageHTML(id){
  const p=(state.pages||[]).find(x=>x.id===id);
  if(!p) return '<div class="hero"><div class="mini">페이지를 찾을 수 없습니다.</div></div>';
  return `<div class="hero" style="padding:0">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px">
      <b style="font-size:17px">${esc(p.label)}</b>
      <button class="b-ghost" onclick="window.open('${esc(p.url)}','_blank')">새 탭에서 열기</button>
    </div>
    <iframe src="${esc(p.url)}" style="width:100%;height:720px;border:0;border-radius:16px;display:block"></iframe>
  </div>`;
}

// ==================== 가입 정책 ====================
// OPEN_SIGNUP=true  : 누구나 본인 이메일로 가입 가능 (기본 역할: 초대자)
// OPEN_SIGNUP=false : 초대 명단(참석자로 등록된 이메일)에 있는 사람만 가입 가능
// 기밀 회의로 전환하려면 아래를 false로 바꾸세요.
let OPEN_SIGNUP = true;

function isInvited(email){
  const e=(email||"").trim().toLowerCase();
  if(!e)return false;
  if(OPEN_SIGNUP)return true;                     // 열린 가입: 본인 이메일로 누구나 가입
  // 이미 계정이 있으면 허용
  if(state.accounts.some(a=>a.email.toLowerCase()===e))return true;
  // 어떤 회의든 참석자 명단에 있으면 초대된 것으로 본다
  return state.meetings.some(m=>(m.attendees||[]).some(a=>(a.email||"").trim().toLowerCase()===e));
}
function invitedRole(email){
  const e=(email||"").trim().toLowerCase();
  const acc=state.accounts.find(a=>a.email.toLowerCase()===e);
  if(acc)return acc.role;              // 이미 역할이 정해져 있으면 그것을 사용
  return "guest";                       // 초대로 들어오는 사람은 기본 '초대자'
}
// [서버 연동 자리] 실제 인증(Supabase 등)을 붙일 때 이 함수를 구현하세요.
// async function serverAuth(email, pw){ ... return {ok, user} }

async function doLogin(){
  const email=($("loginEmail").value||"").trim().toLowerCase();
  const pw=($("loginPw").value||"").trim();
  const msg=$("authMsg");
  if(!email||!pw){ msg.innerHTML='<span class="gate-err">이메일과 비밀번호를 입력하세요.</span>'; return; }
  // 진짜 인증
  if(authReady){
    msg.innerHTML='<span style="color:#8FD9D2">로그인 중…</span>';
    try{
      await emailSignIn(email,pw);
      const u=await restoreSession();
      if(u){ saveUser(); showMeetingList(); return; }
      msg.innerHTML='<span class="gate-err">로그인에 실패했습니다.</span>';
      return;
    }catch(e){
      if(/Invalid login credentials/i.test(e.message)){
        msg.innerHTML='<span class="gate-err">이메일 또는 비밀번호가 올바르지 않습니다.</span>';
      } else if(/Email not confirmed/i.test(e.message)){
        msg.innerHTML='<span class="gate-err">이메일 확인이 필요합니다. 메일함을 확인해 주세요.</span>';
      } else {
        msg.innerHTML='<span class="gate-err">로그인 실패: '+esc(e.message)+'</span>';
      }
      return;
    }
  }
  // 폴백(로컬 모드)
  const acc=state.accounts.find(a=>a.email.toLowerCase()===email);
  if(!acc){ msg.innerHTML='<span class="gate-err">등록되지 않은 이메일입니다. 회원가입을 해주세요.</span>'; return; }
  if(acc.pw&&acc.pw!==pw){ msg.innerHTML='<span class="gate-err">비밀번호가 일치하지 않습니다.</span>'; return; }
  loginAs(acc);
}
// 소셜 회원가입 (Gmail·Naver·Kakao·Apple) — 데모: 간이 계정 생성. 실제 OAuth는 서버 붙일 때 이 함수만 교체.

// ==================== 진짜 로그인 (Supabase Auth) ====================
let sb=null;                       // Supabase 클라이언트
let authReady=false;

function initAuth(){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return false;
  if(!window.supabase){ console.warn("Supabase 라이브러리 로드 실패"); return false; }
  try{
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    authReady=true;
    return true;
  }catch(e){ console.warn("Auth 초기화 실패:",e.message); return false; }
}

// 소셜 로그인 (진짜 OAuth — Google/Kakao 등)
async function oauthLogin(provider){
  if(!authReady){ toast("인증 설정이 필요합니다 (Supabase Auth)"); return; }
  const map={Gmail:"google",Google:"google",Kakao:"kakao",Apple:"apple",Naver:"google"};
  const p=map[provider]||"google";
  if(provider==="Naver"){ toast("네이버는 준비 중입니다. Google 또는 이메일을 사용해 주세요."); return; }
  try{
    const {error}=await sb.auth.signInWithOAuth({
      provider:p,
      options:{ redirectTo: window.location.origin+window.location.pathname }
    });
    if(error)throw error;
    // 성공 시 브라우저가 provider로 이동 → 돌아오면 restoreSession()이 처리
  }catch(e){
    toast("로그인 실패: "+e.message);
    console.error(e);
  }
}

// 이메일 회원가입 (진짜)
async function emailSignUp(email,pw,name){
  if(!authReady) throw new Error("인증 설정이 필요합니다");
  const {data,error}=await sb.auth.signUp({
    email, password:pw,
    options:{ data:{ full_name:name }, emailRedirectTo: window.location.origin+window.location.pathname }
  });
  if(error) throw error;
  return data;
}
// 이메일 로그인 (진짜)
async function emailSignIn(email,pw){
  if(!authReady) throw new Error("인증 설정이 필요합니다");
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error) throw error;
  return data;
}
async function authSignOut(){
  if(sb) { try{ await sb.auth.signOut(); }catch(e){} }
}

// 로그인된 Supabase 사용자를 허브 사용자로 변환
function userFromAuth(u){
  const email=(u.email||"").toLowerCase();
  const meta=u.user_metadata||{};
  const name=meta.full_name||meta.name||email.split("@")[0];
  // 기존 계정에 역할이 있으면 그 역할, 없으면 초대 여부로 판단
  const acc=state.accounts.find(a=>(a.email||"").toLowerCase()===email);
  const role=acc?acc.role:invitedRole(email);
  return {role,name:acc&&acc.claimed?acc.name:name,email,id:u.id};
}

// 페이지 로드 시 세션 복원 (OAuth 리다이렉트 포함) — 진짜 자동 로그인
async function restoreSession(){
  if(!authReady)return null;
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user){
      const u=userFromAuth(session.user);
      // 계정 목록에 없으면 등록 (초대 명단과 연결)
      let acc=state.accounts.find(a=>(a.email||"").toLowerCase()===u.email);
      if(!acc){
        acc={id:u.id,name:u.name,email:u.email,role:u.role,pw:"",claimed:true,authUser:true};
        state.accounts.push(acc); scheduleSave();
      } else if(!acc.claimed){
        acc.claimed=true; acc.name=u.name||acc.name; scheduleSave();
      }
      state.user={role:acc.role,name:acc.name,email:acc.email,id:acc.id};
      return state.user;
    }
  }catch(e){ console.warn("세션 복원 실패:",e.message); }
  return null;
}

function socialSignup(provider){
  // 진짜 OAuth 로그인 (Supabase Auth)
  if(authReady){ oauthLogin(provider); return; }
  const msg=$("authMsg");
  if(msg)msg.innerHTML='<span class="gate-err">소셜 로그인을 사용하려면 Supabase Auth 설정이 필요합니다. 이메일로 가입해 주세요.</span>';
  else toast("이메일로 가입해 주세요");
}
async function doSignup(){
  const name=($("suName").value||"").trim();
  const email=($("suEmail").value||"").trim();
  const pw=($("suPw").value||"").trim();
  const msg=$("authMsg");
  if(!name||!email){ msg.innerHTML='<span class="gate-err">이름과 이메일을 입력하세요.</span>'; return; }
  if(!pw||pw.length<6){ msg.innerHTML='<span class="gate-err">비밀번호는 6자 이상 입력하세요.</span>'; return; }
  if(!isInvited(email)){
    msg.innerHTML='<span class="gate-err">초대된 이메일이 아닙니다. 회의 개최자에게 초대를 요청해 주세요.</span>'; return;
  }
  // 진짜 인증 (Supabase Auth)
  if(authReady){
    msg.innerHTML='<span style="color:#8FD9D2">가입 중…</span>';
    try{
      await emailSignUp(email,pw,name);
      // 이메일 확인이 켜져 있으면 확인 메일 발송됨
      const u=await restoreSession();
      if(u){ showMeetingList(); return; }
      msg.innerHTML='<span class="gate-ok">가입되었습니다. 확인 메일이 발송되었다면 메일함을 확인한 뒤 로그인해 주세요.</span>';
      return;
    }catch(e){
      if(/already registered|already exists/i.test(e.message)){
        msg.innerHTML='<span class="gate-err">이미 가입된 이메일입니다. 로그인해 주세요.</span>';
      } else {
        msg.innerHTML='<span class="gate-err">가입 실패: '+esc(e.message)+'</span>';
      }
      return;
    }
  }
  // 폴백(로컬 모드)
  const existing=state.accounts.find(a=>a.email.toLowerCase()===email.toLowerCase());
  if(existing){
    if(existing.claimed){ msg.innerHTML='<span class="gate-err">이미 가입된 이메일입니다. 로그인해주세요.</span>'; return; }
    existing.name=name; existing.pw=pw; existing.claimed=true;
    scheduleSave(); loginAs(existing); return;
  }
  const role=invitedRole(email);
  const acc={id:"u_"+Date.now(),name,email,role,pw,claimed:true};
  state.accounts.push(acc); scheduleSave(); loginAs(acc);
}
function loginAs(acc){
  state.user={role:acc.role,name:acc.name,email:acc.email,id:acc.id};
  saveUser();                       // 새로고침해도 로그인 유지
  showMeetingList();
}

function renderMeetingCards(list,emptyMsg){
  const box=$("mlList"); if(!box)return;
  if(!list.length){
    const noMeetings=!emptyMsg;
    box.innerHTML=`<div class="gate-card">
      <div class="m">${esc(emptyMsg||"아직 초대된 회의가 없습니다.")}</div>
      ${noMeetings?`<div class="m" style="margin-top:8px;opacity:.75;font-size:12.5px">
        회의 개최자에게 <b>${esc(state.user.email||"본인 이메일")}</b> 로 초대를 요청해 주세요.<br>
        개최자가 참석자로 등록하면 이곳에 회의가 표시됩니다.
      </div>`:""}
    </div>`;
    return;
  }
  box.innerHTML=list.map(m=>`<div class="mcard2">
    <div class="mc-top"><h4>${esc(m.title)}</h4><span class="mc-badge">${esc(m.company||"")}</span></div>
    <div class="mc-meta">${esc(fmtDate(m.date))} ${esc(m.time)} · ${esc(m.place||"")}</div>
    <div class="mc-meta">개최자 ${esc(m.host)} · 참석 ${(m.attendees||[]).length}명</div>
    <button class="b-mint mc-enter" data-id="${m.id}">입장</button>
  </div>`).join("");
  box.querySelectorAll(".mc-enter").forEach(b=>b.onclick=()=>{ state.currentMeetingId=b.dataset.id; syncCurrentMeeting(); enterHub(); });
}
function fmtDate(d){ if(!d)return""; const p=d.split("-"); return p.length===3?`${p[0]}.${p[1]}.${p[2]}`:d; }
function createMeetingFlow(){
  const title=prompt("회의 제목",""); if(!title)return;
  const date=prompt("날짜 (YYYY-MM-DD)","2026-07-10")||"";
  const time=prompt("시간 (HH:MM)","10:00")||"";
  const place=prompt("장소","숙명캠퍼스타운 209호 미팅룸 1호")||"";
  const m={id:"m_"+Date.now(),title,purpose:"",place,date,time,host:state.user.name,company:"",zoom:"",
    attendees:[{name:state.user.name,email:state.user.email}],jobs:[],started:null,ended:null};
  state.meetings.push(m); scheduleSave(); showMeetingList();
}

function renderHdrUser(){
  const box=$("hdrUser"); if(!box) return;
  const u=state.user;
  if(!u || !u.role){ box.style.display="none"; return; }
  box.style.display="flex";
  $("huAv").textContent=initials(u.name);
  $("huName").textContent=u.name||u.email;
  $("huRole").textContent=roleLabel(u.role);
  const out=$("huOut");
  if(out) out.onclick=async()=>{
    if(!confirm("로그아웃할까요?")) return;
    await authSignOut();
    state.user={role:null,name:"",email:"",id:null};
    await clearUser();
    $("appMain").style.display="none";
    $("gate").style.display="flex";
    box.style.display="none";
    authMode="login"; renderAuth();
  };
}

function enterHub(){
  $("gate").style.display="none";
  renderTabs();
  refreshBadges();          // 참석자 배지·말풍선 즉시 반영
  renderHdrUser();          // 헤더에 로그인 정보 표시
  $("appMain").style.display="flex";
  syncCurrentMeeting();
  // 헤더 회의 제목 갱신
  const m=currentMeeting();
  if(m){ const t=$("hdrMeetingTitle"); if(t)t.textContent=m.title; }
  switchTab("home");
}
// ==================== INIT ====================
(async function(){
  await loadAll();
  const m=currentMeeting();
  if(m&&m.started&&!m.ended)setPill("live","회의 진행 중");else setPill("idle","회의 대기");

  // 1) Supabase Auth 초기화
  initAuth();

  // 2) 진짜 세션 복원 (Google 로그인·이메일 로그인 모두 여기서 자동 로그인)
  if(authReady){
    // OAuth 리다이렉트로 돌아온 경우 URL 정리
    const u=await restoreSession();
    if(u){
      if(window.history&&window.location.hash){ history.replaceState(null,"",window.location.pathname+window.location.search); }
      saveUser();
      showMeetingList();
      // 로그인 상태 변화 감지 (로그아웃·토큰 갱신)
      sb.auth.onAuthStateChange((ev)=>{ if(ev==="SIGNED_OUT"){ state.user={role:null,name:"",email:"",id:null}; clearUser(); authMode="login"; renderAuth(); } });
      return;
    }
    sb.auth.onAuthStateChange(async(ev)=>{
      if(ev==="SIGNED_IN"){ const uu=await restoreSession(); if(uu){ saveUser(); showMeetingList(); } }
    });
  }

  // 3) 로컬 세션 복원 (Auth 미설정 시)
  try{
    const saved=await loadUser();
    if(saved && saved.role && saved.email){
      const acc=state.accounts.find(a=>(a.email||"").toLowerCase()===(saved.email||"").toLowerCase());
      if(acc){
        state.user={role:acc.role,name:acc.name,email:acc.email,id:acc.id};
        showMeetingList();
        return;
      }
    }
  }catch(e){ console.warn("세션 복원 실패:",e.message); }

  renderAuth();
})();
</script>
