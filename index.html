function renderMeetingCards(list,emptyMsg){
  const box=$("mlList"); if(!box)return;
  if(!list.length){
    const noMeetings=!emptyMsg;
    box.innerHTML=`<div class="gate-card">
      <div class="m">${esc(emptyMsg||"아직 초대된 회의가 없습니다.")}</div>
      ${noMeetings?`<div class="m" style="margin-top:8px;opacity:.75;font-size:12.5px">
        회의 개최자에게 <b>${esc(state.user.email||"본인 이메일")}</b> 로 초대를 요청해 주세요.<br>
        개최자가 참석자로 등록하면 이곳에 회의가 표시됩니다.
      </div>`:""}
    </div>`;
    return;
  }
  const canManage=state.user.role==="operator"||state.user.role==="host";
  box.innerHTML=list.map(m=>`<div class="mcard2">
    <div class="mc-top"><h4>${esc(m.title)}</h4><span class="mc-badge">${esc(m.company||"")}</span></div>
    <div class="mc-meta">${esc(fmtDate(m.date))} ${esc(m.time)} · ${esc(m.place||"")}</div>
    <div class="mc-meta">개최자 ${esc(m.host)} · 참석 ${(m.attendees||[]).length}명</div>
    <div style="display:flex;gap:6px">
      <button class="b-mint mc-enter" data-id="${m.id}" style="flex:1">입장</button>
      ${canManage?`<button class="b-ghost mc-edit" data-id="${m.id}">수정</button><button class="b-ghost mc-del" data-id="${m.id}" style="color:#C24A4A">삭제</button>`:""}
    </div>
  </div>`).join("");
  box.querySelectorAll(".mc-enter").forEach(b=>b.onclick=()=>{ state.currentMeetingId=b.dataset.id; syncCurrentMeeting(); enterHub(); });
  box.querySelectorAll(".mc-edit").forEach(b=>b.onclick=()=>openMeetingEditor(b.dataset.id));
  box.querySelectorAll(".mc-del").forEach(b=>b.onclick=()=>{
    const m=state.meetings.find(x=>x.id===b.dataset.id); if(!m)return;
    if(!confirm(`'${m.title}' 회의를 삭제할까요?\n(이미 저장된 회의 기록은 남고, 회의 목록에서만 사라집니다)`))return;
    state.meetings=state.meetings.filter(x=>x.id!==b.dataset.id);
    if(state.currentMeetingId===b.dataset.id)state.currentMeetingId=null;
    scheduleSave(); showMeetingList(); toast("회의를 삭제했습니다");
  });
}
// 회의 편집기 — 제목·날짜·시간·장소·목적·회사(배지)
function openMeetingEditor(id){
  const m=state.meetings.find(x=>x.id===id); if(!m)return;
  let modal=$("mtEditModal"); if(modal)modal.remove();
  modal=document.createElement("div"); modal.id="mtEditModal";
  modal.style.cssText="position:fixed;inset:0;z-index:9999;background:rgba(20,30,30,.55);display:flex;align-items:center;justify-content:center;padding:16px";
  const fld=(label,id2,val,ph)=>`<div style="margin-bottom:9px"><label style="font-size:11.5px;font-weight:800;color:var(--soft)">${label}</label>
    <input id="${id2}" value="${esc(val||"")}" placeholder="${esc(ph||"")}" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:12.5px"></div>`;
  modal.innerHTML=`
  <div style="background:#fff;border-radius:16px;max-width:min(560px,96vw);width:100%;max-height:94vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)">
      <div style="flex:1;font-weight:800;color:var(--deep);font-size:15px">회의 수정</div>
      <button class="b-ghost" id="mtCancel">취소</button>
      <button class="b-mint" id="mtSave">저장</button>
    </div>
    <div style="overflow:auto;padding:14px 18px">
      ${fld("제목","mt_title",m.title)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${fld("날짜","mt_date",m.date,"YYYY-MM-DD")}
        ${fld("시간","mt_time",m.time,"HH:MM")}
      </div>
      ${fld("장소","mt_place",m.place)}
      ${fld("목적","mt_purpose",m.purpose)}
      ${fld("소속·회사 배지 (선택)","mt_company",m.company)}
      <div class="mini" style="line-height:1.5">참석자 등록·초대는 회의 입장 후 [사전 준비] 탭에서 관리합니다.</div>
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  $("mtCancel").onclick=()=>modal.remove();
  $("mtSave").onclick=()=>{
    const title=($("mt_title").value||"").trim(); if(!title){toast("제목을 입력하세요");return;}
    const date=($("mt_date").value||"").trim();
    if(date&&!/^\d{4}-\d{2}-\d{2}$/.test(date)){toast("날짜 형식: YYYY-MM-DD");return;}
    m.title=title; m.date=date; m.time=($("mt_time").value||"").trim();
    m.place=($("mt_place").value||"").trim(); m.purpose=($("mt_purpose").value||"").trim();
    m.company=($("mt_company").value||"").trim();
    if(state.currentMeetingId===m.id)syncCurrentMeeting();
    scheduleSave(); modal.remove(); showMeetingList(); toast("회의 정보를 수정했습니다");
  };
}
window.openMeetingEditor=openMeetingEditor;
function fmtDate(d){ if(!d)return""; const p=d.split("-"); return p.length===3?`${p[0]}.${p[1]}.${p[2]}`:d; }

  const date=prompt("날짜 (YYYY-MM-DD)","2026-07-10")||"";
  const time=prompt("시간 (HH:MM)","10:00")||"";

  const m={id:"m_"+Date.now(),title,purpose:"",place,date,time,host:state.user.name,company:"",zoom:"",
    attendees:[{name:state.user.name,email:state.user.email}],jobs:[],started:null,ended:null};
  state.meetings.push(m); scheduleSave(); showMeetingList();
}

// ==================== INIT ====================
(async function(){
  // 어떤 오류든 첫 화면에 표시 (콘솔에만 남지 않도록)
  window.addEventListener("error",ev=>{
    try{ const a=$("authArea");
      if(a&&!a.querySelector(".boot-err")){
        const d=document.createElement("div"); d.className="boot-err";
        d.style.cssText="margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(255,120,100,.15);color:#FFB4A2;font-size:12.5px;line-height:1.6";
        d.textContent="스크립트 오류: "+(ev.message||"")+" ("+(ev.filename||"").split("/").pop()+":"+(ev.lineno||"")+") — 이 문구를 그대로 전달해 주세요";
        a.appendChild(d); }
    }catch(_){}
  });
  // 6초가 지나도 로그인 영역이 비어 있으면 강제로 로그인 화면 표시
  setTimeout(()=>{ try{ const a=$("authArea"); if(a&&!a.innerHTML.trim()){ authGateMsg=authGateMsg||"초기화가 지연되어 로그인 화면을 표시합니다 (클라우드 응답 지연 가능)"; renderAuth(); } }catch(_){} },6000);
  try{ await loadAll(); }catch(e){ authGateMsg="데이터 불러오기 오류: "+(e.message||e); }
  const m=currentMeeting();
  if(m&&m.started&&!m.ended)setPill("live","회의 진행 중");else setPill("idle","회의 대기");

  // 1) Supabase Auth 초기화
  initAuth();

  // 2) 진짜 세션 복원 (Google 로그인·이메일 로그인 모두 여기서 자동 로그인)
  if(authReady){
    // OAuth 리다이렉트로 돌아온 경우 URL 정리
    const u=await restoreSession();
    if(u){
      if(window.history&&window.location.hash){ history.replaceState(null,"",window.location.pathname+window.location.search); }
      saveUser();
      showMeetingList();
      // 로그인 상태 변화 감지 (로그아웃·토큰 갱신)
      sb.auth.onAuthStateChange((ev)=>{ if(ev==="SIGNED_OUT"){ state.user={role:null,name:"",email:"",id:null}; clearUser(); authMode="login"; renderAuth(); } });
      return;
    }
    sb.auth.onAuthStateChange(async(ev)=>{
      if(ev==="SIGNED_IN"){ const uu=await restoreSession(); if(uu){ saveUser(); showMeetingList(); } }
    });
  }

  // 3) 로컬 세션 복원 (Auth 미설정 시)
  try{
    const saved=await loadUser();
    if(saved && saved.role && saved.email){
      const acc=state.accounts.find(a=>(a.email||"").toLowerCase()===(saved.email||"").toLowerCase());
      if(acc){
        state.user={role:acc.role,name:acc.name,email:acc.email,id:acc.id};
        showMeetingList();
        return;
      }
    }
  }catch(e){ console.warn("세션 복원 실패:",e.message); }

  renderAuth();
})();
</script>
</body>
</html>
